project:
  type: website
  output-dir: _site
  preview:
    port: 4848

website:
  title: "Assessing Professor Effectiveness"
  description: "A statistical analysis of 89,893 RateMyProfessor records — gender bias, teaching tags, and predictive models."
  favicon: favicon.svg
  reader-mode: true
  open-graph: true
  twitter-card: true
  site-url: "https://deepanshumody.github.io/Analysis_RMP_Ratings"
  image: social-card.png
  navbar:
    pinned: true
    left:
      - href: index.qmd
        text: Overview
      - href: methods.qmd
        text: Methods
      - href: gender.qmd
        text: Gender bias
      - href: tags.qmd
        text: Tags
      - href: models.qmd
        text: Models
      - href: extensions.qmd
        text: Extensions
    right:
      - icon: github
        href: https://github.com/deepanshumody/Analysis_RMP_Ratings
        aria-label: GitHub repository
  page-footer:
    border: true
    left: "NYU DS-GA 1001 capstone · Group CAP 85"
    right: "Analysis & engineering by Deepanshu Mody"

format:
  html:
    theme: styles.scss
    toc: true
    toc-depth: 3
    code-fold: true
    code-tools: true
    code-overflow: wrap
    fig-align: center
    fig-dpi: 160
    df-print: kable
    highlight-style: github
    include-in-header:
      text: |
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

execute:
  echo: true
  warning: false
  freeze: auto
